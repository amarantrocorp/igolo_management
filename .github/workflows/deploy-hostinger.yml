name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backend lint
        run: |
          cd backend
          pip install ruff
          ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: igolo
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/igolo
            git pull origin main
            docker compose -f infra/hostinger/docker-compose.prod.yml build --parallel
            docker compose -f infra/hostinger/docker-compose.prod.yml up -d --remove-orphans
            docker compose -f infra/hostinger/docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f
