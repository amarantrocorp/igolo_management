name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run backend tests
        env:
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          SECRET_KEY: test-secret-key-for-ci
        run: pytest -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Lint & build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # First-time setup: install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # First-time setup: clone repo if missing
            if [ ! -d /opt/igolo ]; then
              echo "Cloning repository..."
              mkdir -p /opt/igolo
              git clone https://github.com/${{ github.repository }}.git /opt/igolo
            fi

            cd /opt/igolo
            git pull origin main

            # Create .env from template if missing
            if [ ! -f .env ]; then
              echo "Creating .env from template..."
              cp infra/hostinger/.env.production .env
              echo "⚠️  EDIT .env with your production secrets before running again!"
              exit 1
            fi

            # Build and deploy
            docker compose -f infra/hostinger/docker-compose.prod.yml build --parallel
            docker compose -f infra/hostinger/docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to be healthy
            echo "Waiting for backend..."
            sleep 10

            # Run migrations
            docker compose -f infra/hostinger/docker-compose.prod.yml exec -T backend alembic upgrade head || echo "Migration warning (may need manual run)"

            # Cleanup
            docker image prune -f

            echo "✅ Deploy complete!"
