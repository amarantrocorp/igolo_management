name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/igolo
            git pull origin main
            docker compose -f infra/hostinger/docker-compose.prod.yml build --parallel
            docker compose -f infra/hostinger/docker-compose.prod.yml up -d --remove-orphans
            docker compose -f infra/hostinger/docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f
