<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f7; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; margin-top: 20px; margin-bottom: 20px; }
        .header { background: #2563eb; color: white; padding: 20px 30px; }
        .header h1 { margin: 0; font-size: 20px; }
        .body { padding: 30px; color: #333; line-height: 1.6; }
        .button { display: inline-block; background: #2563eb; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; margin: 15px 0; }
        .footer { padding: 20px 30px; background: #f8fafc; text-align: center; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ subject }}</h1>
        </div>
        <div class="body">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            IntDesign ERP &mdash; Interior Design & Execution Management
        </div>
    </div>
</body>
</html>
