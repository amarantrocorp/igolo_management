# Backend ServiceAccount with IRSA annotation for AWS access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: igolo-backend
  labels:
    app: igolo-backend
  annotations:
    # Replace with actual IAM role ARN for IRSA (IAM Roles for Service Accounts)
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/igolo-backend-irsa-role
