# Backend API Deployment - FastAPI application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: igolo-backend
  labels:
    app: igolo-backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: igolo-backend
  template:
    metadata:
      labels:
        app: igolo-backend
        component: api
    spec:
      serviceAccountName: igolo-backend
      containers:
        - name: backend
          image: ACCOUNT.dkr.ecr.ap-south-1.amazonaws.com/igolo-backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: igolo-config
            - secretRef:
                name: igolo-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
