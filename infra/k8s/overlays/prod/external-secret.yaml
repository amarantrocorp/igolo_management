# ExternalSecret - Syncs secrets from AWS Secrets Manager (prod)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: igolo-secrets
  labels:
    app: igolo
    environment: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: igolo-secrets
    creationPolicy: Owner
  data:
    # Database credentials
    - secretKey: DATABASE_URL
      remoteRef:
        key: igolo/prod/database
        property: DATABASE_URL
    - secretKey: DB_PASSWORD
      remoteRef:
        key: igolo/prod/database
        property: DB_PASSWORD
    # Application secrets
    - secretKey: SECRET_KEY
      remoteRef:
        key: igolo/prod/app
        property: SECRET_KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: igolo/prod/app
        property: JWT_SECRET
    - secretKey: SENTRY_DSN
      remoteRef:
        key: igolo/prod/app
        property: SENTRY_DSN
    # Gemini AI API key (prod only)
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: igolo/prod/app
        property: GEMINI_API_KEY
