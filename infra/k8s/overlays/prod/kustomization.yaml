# Prod Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: igolo-prod

resources:
  - ../../base
  - namespace.yaml
  - external-secret.yaml
  - redis/deployment.yaml
  - redis/service.yaml

patches:
  - path: ingress-patch.yaml
  - path: hpa-patch.yaml

configMapGenerator:
  - name: igolo-config
    literals:
      - ENVIRONMENT=production
      - AI_PROVIDER=gemini
      - CORS_ORIGINS=https://app.igolo.in
      - S3_BUCKET_NAME=igolo-prod-uploads
      - S3_REGION=ap-south-1
      - REDIS_URL=redis://redis:6379/0
      - NEXT_PUBLIC_API_URL=https://app.igolo.in/api/v1
